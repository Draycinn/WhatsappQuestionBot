name: Daily WhatsApp Message

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily — adjust for your timezone
  workflow_dispatch: {}    # lets you trigger manually to test

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send message
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python send.py

      - name: Commit updated index
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git commit -m "Update sentence index" || echo "No changes"
          git push
